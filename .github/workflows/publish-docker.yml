name: Publish Docker to GHCR (Reusable)

on:
  workflow_call:
    inputs:
      project_type:
        description: "Project type to read version from (node | python)"
        required: false
        type: string
        default: "node"
      registry:
        description: "Registry hostname"
        required: false
        type: string
        default: "ghcr.io"
      image_name:
        description: "Full image name (e.g., ghcr.io/owner/repo)"
        required: false
        type: string
        default: "ghcr.io/${{ github.repository }}"
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "./Dockerfile"
      platforms:
        required: false
        type: string
        default: "linux/amd64"
      push:
        required: false
        type: boolean
        default: true
    outputs:
      version:
        description: "Project version"
        value: ${{ jobs.build-and-publish.outputs.version }}
      tags:
        description: "Docker tags used"
        value: ${{ jobs.build-and-publish.outputs.tags }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Validate inputs
        if: inputs.project_type != 'node' && inputs.project_type != 'python'
        run: |
          echo "::error::Invalid project_type '${{ inputs.project_type }}'. Must be 'node' or 'python'."
          exit 1

      - name: Setup uv
        if: inputs.project_type == 'python'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8

      - name: Read version
        id: version
        shell: bash
        run: |
          if [ "${{ inputs.project_type }}" = "python" ]; then
            VERSION=$(uv version --short)
          else
            VERSION=$(npm pkg get version | tr -d '"')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          platforms: ${{ inputs.platforms }}

      - name: Summary
        shell: bash
        run: |
          {
            echo "## ✅ Build and Publish Complete!"
            echo
            echo "**Version:** \`${{ steps.version.outputs.version }}\`"
            echo "**Docker Images:**"
            echo "- \`${{ inputs.image_name }}:${{ steps.version.outputs.version }}\`"
            echo "- \`${{ inputs.image_name }}:latest\`"
            echo
            echo "**Pull Command:**"
            echo '```bash'
            echo "docker pull ${{ inputs.image_name }}:${{ steps.version.outputs.version }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
