on:
  workflow_call:
    inputs:
      doc_repo:
        required: true
        type: string
        description: "Target documentation repository (owner/name)"
      doc_path:
        required: true
        type: string
        description: "Path to documentation files in the doc repo"
      openai_model:
        required: false
        type: string
        default: "gpt-4o"
        description: "OpenAI Model to use."
      openai_base_url:
        required: false
        type: string
        description: "Custom OpenAI Base URL."
      pr_number:
        required: true
        type: string
        description: "PR number to analyze."
      client_id:
        required: true
        type: string
        description: "GitHub App ID used to mint an installation token."
    secrets:
      OPENAI_API_KEY:
        required: true
      DOC_APP_PRIVATE_KEY:
        required: true
        description: "Private key (PEM) of the GitHub App identified by client_id."

jobs:
  # Parse the triggering comment: accept "/documentation" optionally followed by
  # free-text custom instructions, and extract that text.
  parse-comment:
    if: ${{ github.event.comment && startsWith(github.event.comment.body, '/documentation') && github.event.issue && github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    permissions:
      issues: write          # react to / comment on the triggering PR comment
      pull-requests: write
    outputs:
      custom_instructions: ${{ steps.parse.outputs.custom_instructions }}
    steps:
      # Immediately acknowledge the command with a 👀 reaction so the user
      # knows the run started. Best-effort: never fail the run over a reaction.
      - name: Acknowledge command with 👀
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=eyes

      - name: Extract custom instructions
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Strip the leading "/documentation" token; the remainder (trimmed,
          # surrounding quotes removed) becomes the custom instructions.
          INSTR="${COMMENT_BODY#/documentation}"
          INSTR="$(printf '%s' "$INSTR" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/^"//' -e 's/"$//')"
          {
            echo "custom_instructions<<EOF"
            printf '%s\n' "$INSTR"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  check-and-update:
    needs: parse-comment
    uses: ./.github/workflows/llm-doc-update.yml
    with:
      doc_repo: ${{ inputs.doc_repo }}
      doc_path: ${{ inputs.doc_path }}
      openai_model: ${{ inputs.openai_model }}
      openai_base_url: ${{ inputs.openai_base_url }}
      pr_number: ${{ inputs.pr_number }}
      client_id: ${{ inputs.client_id }}
      custom_instructions: ${{ needs.parse-comment.outputs.custom_instructions }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DOC_APP_PRIVATE_KEY: ${{ secrets.DOC_APP_PRIVATE_KEY }}
