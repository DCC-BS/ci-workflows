name: Python Backend CI (Reusable)

on:
  workflow_call:
    inputs:
      python_versions:
        description: JSON array of Python versions for the test matrix
        required: false
        type: string
        default: '["3.12"]'
      check_command:
        description: Command to run project quality checks
        required: false
        type: string
        default: "make check"
      quality_python_version:
        description: Python version used for quality job
        required: false
        type: string
        default: "3.12"
      test_command:
        description: Optional command to run tests
        required: false
        type: string
        default: ""
      uv_version:
        description: uv version to install
        required: false
        type: string
        default: "0.11.3"
      working_directory:
        description: Project directory
        required: false
        type: string
        default: "."
      uv_extra_packages:
        description: Extra packages to install with uv
        required: false
        type: string
        default: ""

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles(format('{0}/.pre-commit-config.yaml', inputs.working_directory)) }}

      - name: Set up the environment
        uses: DCC-BS/ci-workflows/actions/setup-python-env@814649735835a84a3d0d6c8d6e6db87dfeb8b348 # v8
        with:
          python-version: ${{ inputs.quality_python_version }}
          uv-version: ${{ inputs.uv_version }}
          working-directory: ${{ inputs.working_directory }}
          uv_extra_packages: ${{ inputs.uv_extra_packages }}
      - name: Install varlock
        run: curl -sSfL https://varlock.dev/install.sh | sh -s
      - name: Run quality checks
        run: ${{ inputs.check_command }}

  tests-and-type-check:
    name: Tests & Type Checks
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ inputs.test_command != '' || inputs.typecheck_command != '' }}
    strategy:
      matrix:
        python-version: ${{ fromJson(inputs.python_versions) }}
      fail-fast: false
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up the environment
        uses: DCC-BS/ci-workflows/actions/setup-python-env@814649735835a84a3d0d6c8d6e6db87dfeb8b348 # v8
        with:
          python-version: ${{ matrix.python-version }}
          uv-version: ${{ inputs.uv_version }}
          working-directory: ${{ inputs.working_directory }}
          uv_extra_packages: ${{ inputs.uv_extra_packages }}

      - name: Run tests
        if: ${{ inputs.test_command != '' }}
        run: ${{ inputs.test_command }}
