name: "LLM Doc Auto-Update"

on:
  workflow_call:
    inputs:
      doc_repo:
        required: true
        type: string
        description: "Target documentation repository (owner/name)"
      doc_path:
        required: true
        type: string
        description: "Path to documentation files in the doc repo"
      openai_model:
        required: false
        type: string
        default: "gpt-4o"
        description: "OpenAI Model to use."
      openai_base_url:
        required: false
        type: string
        description: "Custom OpenAI Base URL."
      pr_number:
        required: true
        type: string
        description: "PR number to analyze."
      custom_instructions:
        required: false
        type: string
        default: ""
        description: "Optional free-text instructions from the /documentation command."
      client_id:
        required: true
        type: string
        description: "GitHub App ID used to mint an installation token."
    secrets:
      OPENAI_API_KEY:
        required: true
      DOC_APP_PRIVATE_KEY:
        required: true
        description: "Private key (PEM) of the GitHub App identified by client_id."

jobs:
  llm-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Checkout Workflow Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: DCC-BS/ci-workflows
          path: ci-workflows

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r ci-workflows/scripts/requirements.txt

      # Resolve the owner and repo names, and ensure source + doc share an owner
      # (a single GitHub App installation token cannot span different owners).
      - name: Resolve app token scope
        id: scope
        env:
          SRC: ${{ github.repository }}
          DOC: ${{ inputs.doc_repo }}
        run: |
          SRC_OWNER="${SRC%%/*}"; SRC_NAME="${SRC#*/}"
          DOC_OWNER="${DOC%%/*}"; DOC_NAME="${DOC#*/}"
          if [ "$SRC_OWNER" != "$DOC_OWNER" ]; then
            echo "::error::Source ($SRC_OWNER) and doc ($DOC_OWNER) repos have different owners; a single GitHub App token cannot span owners."
            exit 1
          fi
          echo "owner=$SRC_OWNER" >> "$GITHUB_OUTPUT"
          echo "repositories=$SRC_NAME,$DOC_NAME" >> "$GITHUB_OUTPUT"

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.client_id }}
          private-key: ${{ secrets.DOC_APP_PRIVATE_KEY }}
          owner: ${{ steps.scope.outputs.owner }}
          repositories: ${{ steps.scope.outputs.repositories }}

      - name: Run LLM Doc Updater
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.openai_model }}
          OPENAI_BASE_URL: ${{ inputs.openai_base_url }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CUSTOM_INSTRUCTIONS: ${{ inputs.custom_instructions }}
        run: |
          PR_NUM="${PR_NUMBER}"
          SRC_REPO="${{ github.repository }}"

          if [ -z "$PR_NUM" ] || [ "$PR_NUM" == "null" ]; then
             echo "Error: Could not determine PR number. Ensure this is run in a PR context or pass pr_number."
             exit 1
          fi

          echo "Running Doc Updater for PR #$PR_NUM in $SRC_REPO against ${{ inputs.doc_repo }}/${{ inputs.doc_path }}..."

          python ci-workflows/scripts/llm_doc_updater.py \
            --source-pr "$PR_NUM" \
            --source-repo "$SRC_REPO" \
            --doc-repo "${{ inputs.doc_repo }}" \
            --doc-path "${{ inputs.doc_path }}" \
            --repo-path "." \
            --custom-instructions "$CUSTOM_INSTRUCTIONS"
